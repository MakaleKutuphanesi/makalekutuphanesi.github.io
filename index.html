<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Makale Kütüphanesi</title>
    <link rel="shortcut icon" href="img/Favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container-video" id="container-video">
        <video class="video" id="video" autoplay muted loop>
            <source src="vid/video.mp4" type="video/mp4" />
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="container" id="container">
        <img class="gif" src="img/dots.gif" alt="Dots">
        <h2 class="text">Bağlantı sağlanmadan önce tarayıcınız test edilecek.</h2>
        <p class="text">Bu işlem otomatik gerçekleşecektir.</p>
        <p class="text-captcha" id="text-captcha">Lütfen Captcha testini girin</p>
        <div class="counter" id="counter">3</div>
        <div class="recaptcha-container" id="recaptcha-container">
            <div class="button-container">
                <div class="button" id="button" onclick="showVideo()"></div>
            </div>
            <div class="text-container">
                <p>Ben robot değilim</p>
            </div>
            <div class="image-container">
                <img src="img/RecaptchaLogo.png" alt="Recaptcha">
                <p>Privacy - Terms</p>
            </div>
        </div>
        <a class="link" href="https://www.mit.gov.tr/">mit tarafından korunuyorsunuz</a>
        <p>Captcha ID: oeRTE3169</p>
    </div>
</body>

<script src="main.js"></script>

</html>
